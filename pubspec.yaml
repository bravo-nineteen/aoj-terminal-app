name: aoj_terminal_app
description: AOJ Terminal App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.3
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  webview_flutter: ^4.7.0
  csv: ^6.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/aoj_logo.png
